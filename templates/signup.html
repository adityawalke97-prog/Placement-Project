<!DOCTYPE html>
<html>
<head>
    <title>Sign Up - Placement Training Portal</title>
    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, sans-serif;
        }

        body{
            background:#f4f6f9;
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
        }

        .container{
            width:400px;
            background:#fff;
            padding:40px;
            border-radius:10px;
            box-shadow:0 0 15px rgba(0,0,0,0.1);
        }

        h1{
            text-align:center;
            color:#007bff;
            margin-bottom:30px;
        }

        label{
            font-weight:bold;
            display:block;
            margin-top:15px;
        }

        input{
            width:100%;
            padding:12px;
            margin-top:5px;
            border:1px solid #ccc;
            border-radius:5px;
            font-size:15px;
        }

        button{
            width:100%;
            padding:12px;
            margin-top:25px;
            background:#007bff;
            color:white;
            border:none;
            border-radius:5px;
            font-size:16px;
            cursor:pointer;
        }

        button:hover{
            background:#0056b3;
        }

        p{
            text-align:center;
            margin-top:20px;
        }

        a{
            text-decoration:none;
            color:#007bff;
        }
    </style>
</head>
<body>

<div class="container">

    <h1>Create Account</h1>

    <form action="/signup" method="POST">

        <label>Full Name</label>
        <input type="text" name="name" required>

        <label>Email</label>
        <input type="email" name="email" required>

        <label>Password</label>
        <input type="password" name="password" required>

        <button type="submit">Sign Up</button>

    </form>

    <p>
        Already have an account?
        <a href="/login">Login</a>
    </p>

</div>

</body>
</html>
