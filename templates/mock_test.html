{% extends 'layout.html' %}

{% block title %}Mock Test{% endblock %}

{% block content %}

<h1 class="page-title">📝 Mock Test</h1>

<form method="POST" action="/submit_test">

{% for q in questions %}

<div class="card">

    <h3>Q{{ loop.index }}. {{ q.question }}</h3>

    <div class="option">
        <input type="radio"
               name="q{{ q.id }}"
               value="{{ q.option1 }}">
        {{ q.option1 }}
    </div>

    <div class="option">
        <input type="radio"
               name="q{{ q.id }}"
               value="{{ q.option2 }}">
        {{ q.option2 }}
    </div>

    <div class="option">
        <input type="radio"
               name="q{{ q.id }}"
               value="{{ q.option3 }}">
        {{ q.option3 }}
    </div>

    <div class="option">
        <input type="radio"
               name="q{{ q.id }}"
               value="{{ q.option4 }}">
        {{ q.option4 }}
    </div>

</div>

{% endfor %}

<button class="btn-submit">
    Submit Test
</button>

</form>

{% endblock %}
