{% extends 'layout.html' %}

{% block title %}Advanced Resume Builder{% endblock %}

{% block content %}

<h1 class="page-title">📄 Advanced Resume Builder</h1>

<div class="card">

    <form method="POST" action="/resume_builder">

        <label>Full Name</label>
        <input type="text" name="name" required>

        <label>Email</label>
        <input type="email" name="email" required>

        <label>Mobile Number</label>
        <input type="text" name="mobile" required>

        <label>LinkedIn Profile</label>
        <input type="url" name="linkedin">

        <label>GitHub/Portfolio</label>
        <input type="url" name="portfolio">

        <label>Professional Summary</label>
        <textarea name="summary" placeholder="Brief career overview"></textarea>

        <label>Education</label>
        <textarea name="education" required></textarea>

        <label>Technical Skills</label>
        <textarea name="technical_skills"></textarea>

        <label>Soft Skills</label>
        <textarea name="soft_skills"></textarea>

        <label>Projects</label>
        <textarea name="projects"></textarea>

        <label>Internship / Experience</label>
        <textarea name="experience"></textarea>

        <label>Achievements</label>
        <textarea name="achievements"></textarea>

        <label>Certifications</label>
        <textarea name="certifications"></textarea>

        <label>Languages</label>
        <textarea name="languages"></textarea>

        <label>References</label>
        <textarea name="references"></textarea>

        <br><br>

        <button type="submit" class="btn-submit">
            Generate Resume
        </button>

    </form>

</div>

{% endblock %}
