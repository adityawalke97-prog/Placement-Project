{% extends 'layout.html' %}

{% block title %}{{ course_name }} Course{% endblock %}

{% block content %}
<div class="course-section">
    <h2>{{ course_name }} - {{ day_count }} Day Challenge</h2>
    <div class="days">
        {% for i in range(1, day_count+1) %}
        <div class="day-card">
            <h3>Day {{ i }}</h3>
            <p>Notes for Day {{ i }}</p>
        </div>
        {% endfor %}
    </div>
</div>
{% endblock %}

{% block css %}
<style>
.course-section {
    margin:30px;
    background:white;
    padding:20px;
    border-radius:15px;
    box-shadow:0 5px 20px rgba(0,0,0,0.08);
}
.course-section h2 {
    color:#111827;
    margin-bottom:15px;
}
.days {
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(150px,1fr));
    gap:15px;
}
.day-card {
    background:#f1f5f9;
    padding:15px;
    border-radius:10px;
    text-align:center;
    transition:0.3s;
}
.day-card:hover {
    background:#2563eb;
    color:white;
    transform:translateY(-5px);
}
</style>
{% endblock %}
